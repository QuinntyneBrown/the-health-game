<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>HealthQuest Mock - Activity edit/delete</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body class="v8">
<section class="screen-frame" data-screen="activity-management" aria-labelledby="activity-management-title">
      <header class="screen-frame__header">
        <div>
          <p>dialog</p>
          <h2 id="activity-management-title">Activity edit/delete</h2>
        </div>
        <a href="./index.html">Index</a>
      </header>
      
    <div class="app-preview app-preview--tabs">
      <header class="app-top">
        <a class="skip-link" href="#main-activity-edit-and-delete">Skip to content</a>
        <div class="brand">
          <span class="brand__mark" aria-hidden="true"></span>
          <span class="brand__name">HealthQuest</span>
        </div>
        <div class="app-top__meta">
          <span class="pill">Edit and delete</span>
          <button class="icon-button" type="button" aria-label="Notifications">
            <span class="dot" aria-hidden="true"></span>
          </button>
        </div>
      </header>
      
    <nav class="app-nav app-nav--tabs" aria-label="Primary">
      
        <a class="app-nav__item app-nav__item--active" href="./dashboard.html">
          <span class="app-nav__mark" aria-hidden="true"></span>
          <span>Home</span>
        </a>
        <a class="app-nav__item" href="./goals-list.html">
          <span class="app-nav__mark" aria-hidden="true"></span>
          <span>Goals</span>
        </a>
        <a class="app-nav__item" href="./rewards-list.html">
          <span class="app-nav__mark" aria-hidden="true"></span>
          <span>Rewards</span>
        </a>
        <a class="app-nav__item" href="./profile.html">
          <span class="app-nav__mark" aria-hidden="true"></span>
          <span>Profile</span>
        </a>
    </nav>
      <main class="app-main" id="main-activity-edit-and-delete">
        <div class="page-title">
          <p class="eyebrow">activity edit/delete dialogs</p>
          <h1>Activity</h1>
          
        </div>
        
    <section class="modal-grid">
      
    <div class="dialog" role="dialog" aria-label="Edit activity">
      <h3>Edit activity</h3>
      <div class="dialog__body">
    <label class="field">
      <span>Quantity</span>
      <input type="number" value="31" />
      <small>minutes</small>
    </label>
    <label class="field">
      <span>Notes optional</span>
      <input type="text" value="Light rain" />
      
    </label></div>
      <div class="dialog__actions">
        <button class="button button--ghost" type="button">Cancel</button><button class="button button--primary" type="button">Save</button>
      </div>
    </div>
      
    <div class="dialog" role="dialog" aria-label="Delete activity">
      <h3>Delete activity</h3>
      <div class="dialog__body"><p>This removes the entry and recomputes streaks.</p></div>
      <div class="dialog__actions">
        <button class="button button--ghost" type="button">Cancel</button><button class="button button--primary" type="button">Delete</button>
      </div>
    </div>
      
    <div class="dialog" role="dialog" aria-label="Discard changes">
      <h3>Discard changes</h3>
      <div class="dialog__body"><p>You have an unsaved quantity and note.</p></div>
      <div class="dialog__actions">
        <button class="button button--ghost" type="button">Keep editing</button><button class="button button--primary" type="button">Discard</button>
      </div>
    </div>
    </section>
      </main>
    </div>
    </section>

</body>
</html>
