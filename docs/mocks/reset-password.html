<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>HealthQuest Mock - Reset password</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body class="v8">
<section class="screen-frame" data-screen="reset-password" aria-labelledby="reset-password-title">
      <header class="screen-frame__header">
        <div>
          <p>/password-reset</p>
          <h2 id="reset-password-title">Reset password</h2>
        </div>
        <a href="./index.html">Index</a>
      </header>
      
    <form class="form-panel form-panel--narrow">
      <h2>Reset password</h2>
      <p>Enter your email. The reset link expires quickly and never exposes tokens in the page.</p>
      
    <label class="field">
      <span>Email</span>
      <input type="email" value="quinn@example.com" />
      
    </label>
      <button class="button button--primary" type="button">Send reset link</button>
      <div class="notice notice--success" role="status">If the account exists, a reset email is on the way.</div>
    </form>
    </section>

</body>
</html>
