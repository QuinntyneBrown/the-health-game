<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>HealthQuest Mock - Goals empty</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body class="v8">
<section class="screen-frame" data-screen="goals-empty" aria-labelledby="goals-empty-title">
      <header class="screen-frame__header">
        <div>
          <p>/goals</p>
          <h2 id="goals-empty-title">Goals empty</h2>
        </div>
        <a href="./index.html">Index</a>
      </header>
      
    <div class="app-preview app-preview--tabs">
      <header class="app-top">
        <a class="skip-link" href="#main-goals-0-active">Skip to content</a>
        <div class="brand">
          <span class="brand__mark" aria-hidden="true"></span>
          <span class="brand__name">HealthQuest</span>
        </div>
        <div class="app-top__meta">
          <span class="pill">0 active</span>
          <button class="icon-button" type="button" aria-label="Notifications">
            <span class="dot" aria-hidden="true"></span>
          </button>
        </div>
      </header>
      
    <nav class="app-nav app-nav--tabs" aria-label="Primary">
      
        <a class="app-nav__item app-nav__item--active" href="./dashboard.html">
          <span class="app-nav__mark" aria-hidden="true"></span>
          <span>Home</span>
        </a>
        <a class="app-nav__item" href="./goals-list.html">
          <span class="app-nav__mark" aria-hidden="true"></span>
          <span>Goals</span>
        </a>
        <a class="app-nav__item" href="./rewards-list.html">
          <span class="app-nav__mark" aria-hidden="true"></span>
          <span>Rewards</span>
        </a>
        <a class="app-nav__item" href="./profile.html">
          <span class="app-nav__mark" aria-hidden="true"></span>
          <span>Profile</span>
        </a>
    </nav>
      <main class="app-main" id="main-goals-0-active">
        <div class="page-title">
          <p class="eyebrow">/goals</p>
          <h1>Goals</h1>
          <button class="button button--primary" type="button">New goal</button>
        </div>
        
    <section class="empty-state">
      <span class="empty-state__mark" aria-hidden="true"></span>
      <h2>No goals yet</h2>
      <p>Choose the smallest repeatable action. The game starts after the first log.</p>
      <button class="button button--primary" type="button">Create first goal</button>
    </section>
      </main>
    </div>
    </section>

</body>
</html>
