<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>HealthQuest Component Mock - Streak summary</title>
  <link rel="stylesheet" href="../styles.css" />
</head>
<body class="v8">
<main class="library-page">
  <a class="mock-breadcrumb" href="./index.html">Components</a>
  <section class="component-demo" aria-labelledby="streak-summary-title">
    <header class="component-demo__header">
      <p class="eyebrow">components library candidate</p>
      <h1 id="streak-summary-title">Streak summary</h1>
      <p>Current and longest streak summaries for list and detail views.</p>
    </header>
    <div class="component-demo__canvas">
      <section class="metrics-grid">
  <article class="metric metric--primary">
  <span class="metric__value">7 days</span>
  <span class="metric__label">Current streak</span>
</article>
  <article class="metric metric--accent">
  <span class="metric__value">12 days</span>
  <span class="metric__label">Longest streak</span>
</article>
  <div class="ring" aria-label="82 percent complete"><span>82%</span></div>
</section>
    </div>
  </section>
</main>
</body>
</html>
