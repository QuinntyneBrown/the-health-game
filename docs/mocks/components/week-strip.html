<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>HealthQuest Component Mock - Week strip</title>
  <link rel="stylesheet" href="../styles.css" />
</head>
<body class="v8">
<main class="library-page">
  <a class="mock-breadcrumb" href="./index.html">Components</a>
  <section class="component-demo" aria-labelledby="week-strip-title">
    <header class="component-demo__header">
      <p class="eyebrow">components library candidate</p>
      <h1 id="week-strip-title">Week strip</h1>
      <p>Seven-day progress strip for cadence windows.</p>
    </header>
    <div class="component-demo__canvas">
      <div class="week-strip" aria-label="Week progress">
  <span class="week-strip__day week-strip__day--complete "><strong>Mon</strong><small>Done</small></span>
  <span class="week-strip__day week-strip__day--complete "><strong>Tue</strong><small>Done</small></span>
  <span class="week-strip__day week-strip__day--complete "><strong>Wed</strong><small>Done</small></span>
  <span class="week-strip__day week-strip__day--complete "><strong>Thu</strong><small>Done</small></span>
  <span class="week-strip__day  week-strip__day--today"><strong>Fri</strong><small>Today</small></span>
  <span class="week-strip__day  "><strong>Sat</strong><small>Next</small></span>
  <span class="week-strip__day  "><strong>Sun</strong><small>Next</small></span>
</div>
    </div>
  </section>
</main>
</body>
</html>
