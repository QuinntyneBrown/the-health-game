<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>HealthQuest Component Mock - Metric card</title>
  <link rel="stylesheet" href="../styles.css" />
</head>
<body class="v8">
<main class="library-page">
  <a class="mock-breadcrumb" href="./index.html">Components</a>
  <section class="component-demo" aria-labelledby="metric-card-title">
    <header class="component-demo__header">
      <p class="eyebrow">components library candidate</p>
      <h1 id="metric-card-title">Metric card</h1>
      <p>Small dashboard summary tiles with semantic tone.</p>
    </header>
    <div class="component-demo__canvas">
      <section class="metrics-grid">
  <article class="metric metric--primary">
  <span class="metric__value">7 days</span>
  <span class="metric__label">Current streak</span>
</article>
  <article class="metric metric--success">
  <span class="metric__value">82%</span>
  <span class="metric__label">Goal completion</span>
</article>
  <article class="metric metric--accent">
  <span class="metric__value">1</span>
  <span class="metric__label">Rewards ready</span>
</article>
</section>
    </div>
  </section>
</main>
</body>
</html>
