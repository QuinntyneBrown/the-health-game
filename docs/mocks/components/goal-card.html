<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>HealthQuest Component Mock - Goal card</title>
  <link rel="stylesheet" href="../styles.css" />
</head>
<body class="v8">
<main class="library-page">
  <a class="mock-breadcrumb" href="./index.html">Components</a>
  <section class="component-demo" aria-labelledby="goal-card-title">
    <header class="component-demo__header">
      <p class="eyebrow">components library candidate</p>
      <h1 id="goal-card-title">Goal card</h1>
      <p>Reusable card for a goal summary, streaks, progress, and reward.</p>
    </header>
    <div class="component-demo__canvas">
      <article class="goal-card">
  <div class="goal-card__top">
    <div>
      <h3>Morning walk</h3>
      <p>30 min daily</p>
    </div>
    <button class="button button--ghost" type="button">Log</button>
  </div>
  <div class="progress-row">
  <div class="progress-row__label">
    <span>Progress</span>
    <strong>82%</strong>
  </div>
  <span class="progress" aria-label="Progress 82%">
    <span style="inline-size:82%"></span>
  </span>
</div>
  <div class="chips">
    <span class="chip">7 current</span>
    <span class="chip">12 best</span>
    <span class="chip chip--accent">Trail breakfast</span>
  </div>
</article>
    </div>
  </section>
</main>
</body>
</html>
