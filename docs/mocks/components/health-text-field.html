<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>HealthQuest Component Mock - Health text field</title>
  <link rel="stylesheet" href="../styles.css" />
</head>
<body class="v8">
<main class="library-page">
  <a class="mock-breadcrumb" href="./index.html">Components</a>
  <section class="component-demo" aria-labelledby="health-text-field-title">
    <header class="component-demo__header">
      <p class="eyebrow">components library candidate</p>
      <h1 id="health-text-field-title">Health text field</h1>
      <p>Labeled text, numeric, select, helper, and error field states.</p>
    </header>
    <div class="component-demo__canvas">
      <div class="form-grid">
  <label class="field">
  <span>Name</span>
  <input type="text" value="Morning walk" />
  
</label>
  <label class="field">
  <span>Target</span>
  <input type="number" value="30" />
  <small>minutes</small>
</label>
  <label class="field">
  <span>Cadence</span>
  <select>
    <option>Daily</option>
    <option>Weekly</option>
    <option>Custom</option>
  </select>
</label>
  <label class="field">
  <span>Password</span>
  <input type="password" value="" />
  <small>At least 12 characters</small>
</label>
</div>
<p class="inline-error" role="alert">Name is required.</p>
    </div>
  </section>
</main>
</body>
</html>
