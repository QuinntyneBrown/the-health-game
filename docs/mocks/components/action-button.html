<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>HealthQuest Component Mock - Action button</title>
  <link rel="stylesheet" href="../styles.css" />
</head>
<body class="v8">
<main class="library-page">
  <a class="mock-breadcrumb" href="./index.html">Components</a>
  <section class="component-demo" aria-labelledby="action-button-title">
    <header class="component-demo__header">
      <p class="eyebrow">components library candidate</p>
      <h1 id="action-button-title">Action button</h1>
      <p>Command buttons, icon actions, and destructive variants.</p>
    </header>
    <div class="component-demo__canvas">
      <div class="variant-row">
  <button class="button button--primary" type="button">Create goal</button>
  <button class="button button--ghost" type="button">Cancel</button>
  <button class="icon-button" type="button" aria-label="Notifications"><span class="dot" aria-hidden="true"></span></button>
  <button class="icon-button icon-button--danger" type="button" aria-label="Delete activity"></button>
</div>
    </div>
  </section>
</main>
