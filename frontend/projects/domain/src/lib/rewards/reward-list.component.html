<main class="library-page">
  <section class="screen-frame" data-screen="rewards-list" aria-labelledby="rewards-list-title">
    <header class="screen-frame__header">
      <div>
        <p>/rewards</p>
        <h2 id="rewards-list-title">Rewards list</h2>
      </div>
      <a href="/">Home</a>
    </header>

    <div class="app-preview app-preview--tabs">
      <main class="app-main" id="main-rewards-real-backend">
        <div class="page-title">
          <p class="eyebrow">real backend</p>
          <h1>Rewards</h1>
          <button class="button button--ghost" type="button" data-testid="reload-rewards" (click)="load()">
            Reload
          </button>
        </div>

        <p class="pill" role="status" data-testid="rewards-status">{{ status() }}</p>

        <section class="reward-grid" data-testid="reward-list">
          @for (reward of rewards(); track reward.id) {
            <article class="reward-card" [attr.data-testid]="'reward-card-' + reward.id">
              <div class="reward-card__top">
                <div>
                  <h3>{{ reward.name }}</h3>
                  <p>{{ reward.description }}</p>
                </div>
                <span class="pill">{{ reward.status }}</span>
              </div>
            </article>
          } @empty {
            <article class="empty-state" data-testid="rewards-empty-real">
              <h2>No rewards yet</h2>
              <p>Create one from the goals page.</p>
            </article>
          }
        </section>
      </main>
    </div>
  </section>
</main>
