<main class="library-page">
  <section class="screen-frame" data-screen="rewards-list" aria-labelledby="rewards-list-title">
    <header class="screen-frame__header">
      <div>
        <p>/rewards</p>
        <hg-section-header title="Rewards list" headingId="rewards-list-title" />
      </div>
      <a href="/">Home</a>
    </header>

    <div class="app-preview app-preview--tabs">
      <main class="app-main" id="main-rewards-real-backend">
        <hg-page-header eyebrow="real backend" title="Rewards" />
        <hg-action-button label="Reload" variant="ghost" icon="refresh" testId="reload-rewards" (actionSelected)="load()" />

        <hg-status-banner [message]="status()" data-testid="rewards-status" />

        <section class="reward-grid" data-testid="reward-list">
          @for (reward of rewards(); track reward.id) {
            <hg-reward-card
              [attr.data-testid]="'reward-card-' + reward.id"
              [name]="reward.name"
              [description]="reward.description"
              [statusLabel]="reward.status"
              [earnedDateLabel]="reward.earnedAt ?? ''"
              [isEarned]="reward.status === 'earned'"
              [progressCurrent]="rewardProgressCurrent(reward)"
              [progressTarget]="rewardProgressTarget(reward)"
            />
          } @empty {
            <hg-empty-state title="No rewards yet" description="Create one from the goals page." data-testid="rewards-empty-real" />
          }
        </section>
      </main>
    </div>
  </section>
</main>
