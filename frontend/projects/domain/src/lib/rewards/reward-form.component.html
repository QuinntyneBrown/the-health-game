<main class="library-page">
  <section class="app-main" id="main-define-reward-goal-target-or-streak-milestone">
    <hg-page-header eyebrow="/rewards/new and /rewards/:id/edit" title="Define reward" />
    <hg-status-banner [message]="status()" />
    <section class="form-panel">
      <hg-health-text-field label="Name" [value]="name" (valueChange)="name = $event" />
      <hg-health-text-field label="Description" [value]="description" (valueChange)="description = $event" />
      <hg-segmented-filter ariaLabel="Goal" [options]="goalOptions()" [value]="goalId" (valueChange)="setGoal($event)" />
      <hg-segmented-filter ariaLabel="Condition" [options]="conditionOptions" [value]="conditionType" (valueChange)="setCondition($event)" />
      <hg-health-text-field label="Streak days" type="number" [value]="streakDays" (valueChange)="setStreakDays($event)" />
      <div class="actions actions--end">
        <hg-action-button label="Cancel" variant="ghost" />
        <hg-action-button label="Create reward" icon="redeem" (actionSelected)="save()" />
      </div>
    </section>
  </section>
</main>
