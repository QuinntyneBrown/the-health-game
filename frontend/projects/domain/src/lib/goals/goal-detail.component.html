<main class="library-page">
  <section class="app-main" id="main-goal-detail">
    <hg-status-banner [message]="status()" />
    @if (goal(); as currentGoal) {
      <hg-page-header eyebrow="/goals/:id" [title]="currentGoal.name" actionLabel="Log" actionIcon="add" />
      <hg-goal-card
        [title]="currentGoal.name"
        [description]="currentGoal.description"
        [cadenceLabel]="currentGoal.cadence"
        [progressValue]="progress(currentGoal)"
        [currentStreakLabel]="currentGoal.currentStreak + ' current'"
        [longestStreakLabel]="currentGoal.longestStreak + ' best'"
        [rewardName]="currentGoal.rewardName"
        actionLabel="Edit"
      />
      <section class="metrics-grid">
        <hg-metric-card label="Current streak" [value]="currentGoal.currentStreak + ' days'" tone="primary" icon="local_fire_department" />
        <hg-metric-card label="Longest streak" [value]="currentGoal.longestStreak + ' days'" tone="accent" icon="emoji_events" />
        <hg-metric-card label="Target" [value]="currentGoal.target.value + ' ' + currentGoal.target.unit" tone="success" icon="flag" />
      </section>
      <section>
        <hg-section-header title="Activity history" note="API entries" />
        <div class="history-list">
          @for (activity of activities(); track activity.id) {
            <hg-activity-list-item [title]="activityTitle(activity, currentGoal)" [detail]="activity.notes ?? 'No notes'" [metaLabel]="currentGoal.name" />
          } @empty {
            <hg-empty-state title="No activity yet" description="Log the first entry to start streak calculations." actionLabel="Log activity" />
          }
        </div>
      </section>
    } @else {
      <hg-empty-state title="Goal not loaded" description="The requested goal could not be shown." />
    }
  </section>
</main>
