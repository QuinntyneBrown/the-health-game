<hg-page-header
  actionIcon="add"
  actionLabel="New goal"
  [description]="subtitle()"
  headingId="goals-page-title"
  title="Goals"
  (actionSelected)="onCreate()"
/>

@if (isEmpty()) {
  <hg-empty-state
    title="No goals yet"
    description="Create your first goal to start tracking your habits."
    actionLabel="Create goal"
    actionIcon="add"
    icon="flag"
    (actionSelected)="onCreate()"
  />
} @else {
  <header class="goal-list__header">
    <label class="goal-list__search" data-testid="goals-search">
      <span class="goal-list__search-label">Search goals</span>
      <input
        type="search"
        placeholder="Search goals"
        aria-label="Search goals"
        [value]="searchQuery()"
        (input)="searchQuery.set($any($event.target).value)"
      />
    </label>
    <hg-segmented-filter
      ariaLabel="Cadence"
      [options]="cadenceOptions()"
      [value]="cadence()"
      (valueChange)="cadence.set($any($event))"
    />
  </header>

  <ul class="goal-list" data-testid="goal-list">
    @for (goal of visibleGoals(); track goal.id) {
      <li class="goal-list__item">
        <hg-goal-card
          [title]="goal.name"
          [description]="goal.description"
          [cadenceLabel]="cadenceLabel(goal)"
          [progressLabel]="progressLabel(goal)"
          [progressValue]="progressValue(goal)"
          [currentStreakLabel]="currentStreakLabel(goal)"
          [longestStreakLabel]="longestStreakLabel(goal)"
          [rewardName]="goal.rewardName"
          [tone]="toneFor(goal)"
          actionLabel="Open"
          (actionSelected)="onCardSelected(goal)"
        />
      </li>
    }
  </ul>
}

<button
  mat-fab
  type="button"
  class="goal-list__fab"
  data-testid="goals-new-fab"
  aria-label="New goal"
  (click)="onCreate()"
>
  <mat-icon fontSet="material-symbols-rounded">add</mat-icon>
</button>
