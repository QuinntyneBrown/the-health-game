<main class="library-page">
  <section class="screen-frame" data-screen="goals-list" aria-labelledby="goals-list-title">
    <header class="screen-frame__header">
      <div>
        <p>/goals</p>
        <hg-section-header title="Goals list" headingId="goals-list-title" />
      </div>
      <a href="/">Home</a>
    </header>

    <div class="app-preview app-preview--tabs">
      <main class="app-main" id="main-goals-real-backend">
        <hg-page-header eyebrow="real backend" title="Goals" />
        <hg-action-button label="Reload" variant="ghost" icon="refresh" testId="reload-goals" (actionSelected)="load()" />

        <hg-status-banner [message]="status()" data-testid="goals-status" />

        <section class="panel-grid" aria-label="Create goal">
          <hg-section-header title="Create goal" note="API backed" />
          <hg-health-text-field label="Name" [value]="goalName" testId="goal-name" (valueChange)="goalName = $event" />
          <hg-health-text-field label="Description" [value]="goalDescription" testId="goal-description" (valueChange)="goalDescription = $event" />
          <hg-health-text-field label="Target" type="number" [value]="goalTarget" testId="goal-target" (valueChange)="setGoalTarget($event)" />
          <hg-health-text-field label="Unit" [value]="goalUnit" testId="goal-unit" (valueChange)="goalUnit = $event" />
          <hg-segmented-filter ariaLabel="Goal cadence" [options]="cadenceOptions" [value]="goalCadence" data-testid="goal-cadence" (valueChange)="setGoalCadence($event)" />
          <hg-action-button label="Create goal" icon="add" testId="create-goal" (actionSelected)="createGoal()" />
        </section>

        <section class="toolbar-row" aria-label="Activity and reward inputs">
          <hg-health-text-field label="Activity quantity" type="number" [value]="activityQuantity" testId="activity-quantity" (valueChange)="setActivityQuantity($event)" />
          <hg-health-text-field label="Activity notes" [value]="activityNotes" testId="activity-notes" (valueChange)="activityNotes = $event" />
          <hg-health-text-field label="Reward name" [value]="rewardName" testId="reward-name" (valueChange)="rewardName = $event" />
        </section>

        <section class="goal-grid" data-testid="goal-list">
          @for (goal of goals(); track goal.id) {
            <section class="domain-card" [attr.data-testid]="'goal-card-' + goal.id">
              <hg-goal-card
                [title]="goal.name"
                [description]="goalSummaryDescription(goal)"
                [cadenceLabel]="goal.cadence"
                [progressValue]="goalProgress(goal)"
                [currentStreakLabel]="goal.currentStreak + ' current'"
                [longestStreakLabel]="goal.longestStreak + ' best'"
                [rewardName]="goal.rewardName"
                actionLabel="Delete"
                (actionSelected)="deleteGoal(goal)"
              />
              <hg-health-text-field label="Edit name" [testId]="'edit-goal-name-' + goal.id" [value]="editNames[goal.id] ?? goal.name" (valueChange)="setEditName(goal.id, $event)" />
              <div class="actions">
                <hg-action-button label="Update goal" [testId]="'update-goal-' + goal.id" (actionSelected)="updateGoal(goal)" />
                <hg-action-button label="Log activity" [testId]="'log-activity-' + goal.id" (actionSelected)="logActivity(goal)" />
                <hg-action-button label="Create reward" [testId]="'create-reward-' + goal.id" (actionSelected)="createReward(goal)" />
                <hg-action-button label="Delete" variant="danger" [testId]="'delete-goal-' + goal.id" (actionSelected)="deleteGoal(goal)" />
              </div>

              <div class="chips" [attr.data-testid]="'goal-rewards-' + goal.id">
                @for (reward of goalRewards(goal.id); track reward.id) {
                  <hg-reward-card [name]="reward.name" [description]="reward.description" [statusLabel]="reward.status" [isEarned]="reward.status === 'earned'" />
                }
              </div>

              <div [attr.data-testid]="'goal-activities-' + goal.id">
                @for (activity of goalActivities(goal.id); track activity.id) {
                  <hg-activity-list-item
                    [testId]="'activity-' + activity.id"
                    [editTestId]="'update-activity-' + activity.id"
                    [deleteTestId]="'delete-activity-' + activity.id"
                    [title]="activityTitle(activity, goal)"
                    [detail]="activity.notes ?? 'No notes'"
                    [metaLabel]="goal.name"
                    (editSelected)="updateActivity(goal, activity)"
                    (deleteSelected)="deleteActivity(goal, activity)"
                  />
                }
              </div>
            </section>
          } @empty {
            <hg-empty-state title="No goals yet" description="Create a goal to start the real backend flow." data-testid="goals-empty-real" />
          }
        </section>
      </main>
    </div>
  </section>
</main>
