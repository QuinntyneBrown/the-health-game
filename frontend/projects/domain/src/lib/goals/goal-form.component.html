<main class="library-page">
  <section class="app-main" id="main-create-goal-cadence-and-target">
    <hg-page-header eyebrow="/goals/new and /goals/:id/edit" [title]="goalId ? 'Edit goal' : 'Create goal'" />
    <hg-status-banner [message]="status()" />
    <section class="form-panel">
      <hg-health-text-field label="Name" [value]="name" helperText="Shown on dashboard and reminders" (valueChange)="name = $event" />
      <hg-health-text-field label="Description" [value]="description" (valueChange)="description = $event" />
      <hg-health-text-field label="Target amount" type="number" [value]="target" (valueChange)="setTarget($event)" />
      <hg-health-text-field label="Unit" [value]="unit" (valueChange)="unit = $event" />
      <hg-segmented-filter ariaLabel="Cadence" [options]="cadenceOptions" [value]="cadence" (valueChange)="setCadence($event)" />
      <div class="actions actions--end">
        <hg-action-button label="Cancel" variant="ghost" />
        <hg-action-button [label]="goalId ? 'Save goal' : 'Create goal'" icon="save" (actionSelected)="save()" />
      </div>
    </section>
  </section>
</main>
