<main class="library-page">
  <section class="welcome" aria-labelledby="onboarding-title">
    <div class="welcome__copy">
      <hg-app-brand label="HealthQuest" [isLarge]="true" />
      <hg-page-header headingId="onboarding-title" title="Make health a game you can actually win." description="Start with a tiny repeatable action, track the streak, and unlock meaningful rewards." />
      <div class="actions">
        <hg-action-button label="Get started" icon="arrow_forward" />
        <hg-action-button label="I have an account" variant="ghost" icon="login" />
      </div>
    </div>
    <div class="metrics-grid">
      <hg-metric-card label="Starter streak" value="7 days" tone="primary" icon="local_fire_department" />
      <hg-metric-card label="First reward" value="Ready" tone="accent" icon="redeem" />
    </div>
  </section>
</main>
