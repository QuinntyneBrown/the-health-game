<section class="dashboard-overview" aria-labelledby="dashboard-overview-title">
  <div class="dashboard-overview__avatar" data-testid="dashboard-avatar">
    <hg-user-avatar size="medium" name="You" />
  </div>

  <hg-page-header
    actionIcon="add"
    actionLabel="New goal"
    description="Build streaks with goals, activity, and personal rewards."
    [eyebrow]="overview().dateLabel"
    headingId="dashboard-overview-title"
    [title]="overview().greeting"
    (actionSelected)="onNewGoal()"
  />

  <svg
    class="dashboard-overview__bar-chart bar-chart"
    data-testid="dashboard-bar-chart"
    role="img"
    aria-label="Weekly activity"
    viewBox="0 0 280 80"
  >
    @for (day of weeklyChart; track day.label; let i = $index) {
      <rect
        class="bar-chart__bar"
        [attr.x]="i * 40 + 4"
        [attr.y]="60 - day.value * 0.5"
        width="36"
        [attr.height]="day.value * 0.5"
        rx="6"
      />
      <text
        class="bar-chart__axis-label"
        [attr.x]="i * 40 + 22"
        y="76"
        text-anchor="middle"
      >{{ day.label }}</text>
    }
  </svg>

  <div class="dashboard-overview__metrics" aria-label="Progress summary">
    @for (metric of overview().metrics; track metric.label) {
      <hg-metric-card
        [ariaLabel]="metric.ariaLabel"
        [icon]="metric.icon"
        [label]="metric.label"
        [progressValue]="metric.progressValue"
        [supportText]="metric.supportText"
        [tone]="metric.tone"
        [value]="metric.value"
      />
    }
  </div>

  <div class="dashboard-overview__sections">
    <section class="dashboard-overview__section" aria-labelledby="dashboard-goals-title">
      <hg-section-header
        headingId="dashboard-goals-title"
        note="Static scaffold data"
        title="Today's goals"
      />

      <div class="dashboard-overview__goal-list">
        @for (goal of overview().goals; track goal.id) {
          <hg-goal-card
            actionLabel="Log"
            [cadenceLabel]="goal.cadenceLabel"
            [currentStreakLabel]="goal.currentStreakLabel"
            [description]="goal.description"
            [longestStreakLabel]="goal.longestStreakLabel"
            [progressLabel]="goal.progressLabel"
            [progressValue]="goal.progressValue"
            [rewardName]="goal.rewardName"
            [title]="goal.name"
            (actionSelected)="onGoalActionSelected(goal.id)"
          />
        }
      </div>
    </section>

    <section class="dashboard-overview__section" aria-labelledby="dashboard-rewards-title">
      <hg-section-header
        headingId="dashboard-rewards-title"
        note="Preview only"
        title="Rewards"
      />

      @defer (on viewport) {
        <div class="dashboard-overview__reward-list">
          @for (reward of overview().rewards; track reward.id) {
            <hg-reward-card
              [description]="reward.description"
              [earnedDateLabel]="reward.earnedDateLabel"
              [isEarned]="reward.isEarned"
              [name]="reward.name"
              [statusLabel]="reward.statusLabel"
            />
          }
        </div>
      } @placeholder {
        <div class="dashboard-overview__reward-list" aria-hidden="true"></div>
      }
    </section>
  </div>
</section>
