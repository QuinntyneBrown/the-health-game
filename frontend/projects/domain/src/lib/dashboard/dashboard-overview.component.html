<main class="library-page">
  <div class="app-preview app-preview--tabs">
    <hg-app-top-bar statusLabel="Today" />
    <hg-navigation-bar variant="tabs" [items]="navItems" activeItemId="home" />
    <main class="app-main" id="main-good-morning-today">
      <hg-page-header eyebrow="/home" title="Good morning" actionLabel="New goal" actionIcon="add" />
      <hg-status-banner [message]="status()" />

      <section class="hero-strip">
        <div>
          <hg-section-header title="Log the next activity before the day gets away." note="Next best action" />
          <p>Keep the active streaks moving with one small update.</p>
        </div>
        <hg-action-button label="Log activity" icon="add" />
      </section>

      <section class="metrics-grid">
        <hg-metric-card label="Current streak" [value]="bestCurrentStreak() + ' days'" tone="primary" icon="local_fire_department" />
        <hg-metric-card label="Goal completion" [value]="completionPercent() + '%'" tone="success" icon="trending_up" [progressValue]="completionPercent()" />
        <hg-metric-card label="Rewards ready" [value]="rewardsReady().toString()" tone="accent" icon="redeem" />
      </section>

      <section class="two-column">
        <div>
          <hg-section-header title="Today" note="API goals" />
          <section class="goal-grid">
            @for (goal of goals(); track goal.id) {
              <hg-goal-card
                [title]="goal.name"
                [description]="goalDescription(goal)"
                [progressValue]="goalProgress(goal)"
                [currentStreakLabel]="goal.currentStreak + ' current'"
                [longestStreakLabel]="goal.longestStreak + ' best'"
                [rewardName]="goal.rewardName"
                actionLabel="Log"
              />
            }
          </section>
        </div>
        <div>
          <hg-section-header title="Week" note="Synced" />
          <hg-week-strip />
          <hg-status-banner message="Offline snapshot ready. The next sync will merge new entries." />
        </div>
      </section>
    </main>
  </div>
</main>
