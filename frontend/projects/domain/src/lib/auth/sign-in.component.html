<main class="library-page">
  <section class="auth-layout" aria-labelledby="sign-in-title">
    <aside class="auth-hero">
      <hg-app-brand label="HealthQuest" [isLarge]="true" />
      <p>Build healthy streaks. Earn rewards.</p>
    </aside>
    <div class="auth-card">
      <hg-status-banner message="Sign in with the account that owns your goals." />
      <hg-health-text-field label="Username or email" [value]="email" (valueChange)="email = $event" />
      <hg-health-text-field label="Password" type="password" [value]="password" [passwordToggle]="true" (valueChange)="password = $event" />
      <hg-action-button label="Sign in" icon="login" (actionSelected)="signIn()" />
      <hg-action-button label="Continue with SSO" variant="ghost" icon="verified_user" (actionSelected)="signIn()" />
    </div>
  </section>
</main>
