<main class="library-page">
  <section class="modal-grid" aria-label="Session states">
    <div class="dialog" role="dialog" aria-label="Signing you in">
      <hg-section-header title="Signing you in" note="Callback" />
      <hg-status-banner message="Verifying the returned authorization code and restoring the requested route." />
      <span class="skeleton"></span>
      <span class="skeleton skeleton--short"></span>
      <hg-action-button label="Cancel" variant="ghost" />
    </div>
    <div class="dialog" role="dialog" aria-label="Signed out">
      <hg-section-header title="Signed out" note="Local session cleared" />
      <hg-status-banner message="Shared-device data is no longer visible." tone="success" />
      <hg-action-button label="Back to sign in" />
    </div>
    <div class="dialog" role="dialog" aria-label="Session expired">
      <hg-section-header title="Session expired" note="Token invalid" />
      <hg-status-banner message="Re-authentication keeps goals private." tone="error" />
      <hg-action-button label="Sign in again" />
    </div>
  </section>
</main>
