<main class="library-page">
  <section class="form-panel form-panel--narrow" aria-labelledby="create-account-title">
    <hg-page-header headingId="create-account-title" title="Create account" description="Start with one goal. Add more when the first one feels automatic." />
    <hg-status-banner message="Account creation is handled by the configured identity provider." />
    <hg-health-text-field label="Display name" value="Quinn" />
    <hg-health-text-field label="Email" type="email" value="quinn@example.com" />
    <hg-health-text-field label="Password" type="password" helperText="At least 12 characters" [passwordToggle]="true" />
    <hg-action-button label="Create account" icon="person_add" />
  </section>
</main>
