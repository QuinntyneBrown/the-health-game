<main class="library-page">
  <section class="screen-frame" data-screen="profile" aria-labelledby="profile-title">
    <header class="screen-frame__header">
      <div>
        <p>/profile</p>
        <h2 id="profile-title">Profile</h2>
      </div>
      <a href="/">Home</a>
    </header>

    <div class="app-preview app-preview--tabs">
      <main class="app-main" id="main-profile-real-backend">
        <div class="page-title">
          <p class="eyebrow">real backend</p>
          <h1>Profile</h1>
          <button class="button button--ghost" type="button" data-testid="reload-profile" (click)="load()">
            Reload
          </button>
        </div>

        <p class="pill" role="status" data-testid="profile-status">{{ status() }}</p>

        @if (profile(); as currentProfile) {
          <section class="profile-panel" data-testid="profile-summary">
            <div class="avatar" aria-hidden="true">{{ currentProfile.displayName.charAt(0) }}</div>
            <div>
              <h2 data-testid="profile-display">{{ currentProfile.displayName }}</h2>
              <p data-testid="profile-email-display">{{ currentProfile.email }}</p>
              <div class="chips">
                @for (role of currentProfile.roles; track role) {
                  <span class="chip">{{ role }}</span>
                }
              </div>
            </div>
          </section>
        }

        <section class="panel-grid" aria-label="Edit profile">
          <label class="field">
            <span>Display name</span>
            <input data-testid="profile-name" [(ngModel)]="displayName" />
          </label>
          <label class="field">
            <span>Email</span>
            <input data-testid="profile-email" [(ngModel)]="email" />
          </label>
          <button class="button button--primary" type="button" data-testid="save-profile" (click)="save()">
            Save
          </button>
          <button class="button button--ghost" type="button" data-testid="delete-account" (click)="deleteAccount()">
            Delete account
          </button>
        </section>
      </main>
    </div>
  </section>
</main>
