<main class="library-page">
  <section class="screen-frame" data-screen="profile" aria-labelledby="profile-title">
    <header class="screen-frame__header">
      <div>
        <p>/profile</p>
        <hg-section-header title="Profile" headingId="profile-title" />
      </div>
      <a href="/">Home</a>
    </header>

    <div class="app-preview app-preview--tabs">
      <main class="app-main" id="main-profile-real-backend">
        <hg-page-header eyebrow="real backend" title="Profile" />
        <hg-action-button label="Reload" variant="ghost" icon="refresh" testId="reload-profile" (actionSelected)="load()" />

        <hg-status-banner [message]="status()" data-testid="profile-status" />

        @if (profile(); as currentProfile) {
          <section class="profile-panel" data-testid="profile-summary">
            <hg-user-avatar [name]="currentProfile.displayName" />
            <div>
              <hg-section-header [title]="currentProfile.displayName" data-testid="profile-display" />
              <p data-testid="profile-email-display">{{ currentProfile.email }}</p>
              <div class="chips">
                @for (role of currentProfile.roles; track role) {
                  <span class="chip">{{ role }}</span>
                }
              </div>
            </div>
          </section>
        }

        <section class="panel-grid" aria-label="Edit profile">
          <hg-health-text-field label="Display name" [value]="displayName" testId="profile-name" (valueChange)="displayName = $event" />
          <hg-health-text-field label="Email" type="email" [value]="email" testId="profile-email" (valueChange)="email = $event" />
          <hg-action-button label="Save" testId="save-profile" (actionSelected)="save()" />
          <hg-action-button label="Delete account" variant="danger" testId="delete-account" (actionSelected)="deleteAccount()" />
        </section>
      </main>
    </div>
  </section>
</main>
