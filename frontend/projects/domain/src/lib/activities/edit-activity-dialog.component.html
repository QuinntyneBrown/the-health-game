<main class="library-page">
  <div class="dialog" role="dialog" aria-label="Edit activity">
    <hg-section-header title="Edit activity" note="Recomputes streaks" />
    <div class="dialog__body">
      <hg-health-text-field label="Quantity" type="number" value="31" helperText="minutes" />
      <hg-health-text-field label="Notes optional" value="Light rain" />
    </div>
    <div class="dialog__actions">
      <hg-action-button label="Cancel" variant="ghost" />
      <hg-action-button label="Save" icon="save" />
    </div>
  </div>
</main>
