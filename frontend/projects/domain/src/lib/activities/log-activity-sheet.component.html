<main class="library-page">
  <section class="modal-stage modal-stage--single">
    <div class="sheet" role="dialog" aria-label="Log activity">
      <span class="sheet__handle" aria-hidden="true"></span>
      <hg-section-header title="Log activity" note="Bottom sheet" />
      <hg-health-text-field label="Quantity" type="number" value="24" helperText="minutes" />
      <hg-health-text-field label="Notes optional" value="Park loop" />
      <div class="actions actions--end">
        <hg-action-button label="Cancel" variant="ghost" />
        <hg-action-button label="Log" icon="add" />
      </div>
    </div>
  </section>
</main>
