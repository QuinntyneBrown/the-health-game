<main class="library-page">
  <div class="dialog" role="dialog" aria-label="Log activity">
    <hg-section-header title="Log activity" note="Desktop dialog" />
    <div class="dialog__body">
      <hg-health-text-field label="Quantity" type="number" value="24" helperText="minutes" />
      <hg-health-text-field label="Notes optional" value="Park loop" />
    </div>
    <div class="dialog__actions">
      <hg-action-button label="Cancel" variant="ghost" />
      <hg-action-button label="Log" icon="add" />
    </div>
  </div>
</main>
