<main class="library-page">
  <section class="app-main" id="main-stats-week-view">
    <hg-page-header eyebrow="/stats" title="Stats" />
    <hg-segmented-filter ariaLabel="Stats range" [options]="options" [value]="range" (valueChange)="setRange($event)" />
    <hg-status-banner [message]="status()" />
    <section class="chart-panel">
      <hg-section-header title="Activity over time" note="UTC synced" />
      <hg-week-strip />
    </section>
    <section class="metrics-grid metrics-grid--wide">
      <hg-metric-card label="Goal completion" [value]="completionPercent() + '%'" tone="success" [progressValue]="completionPercent()" icon="trending_up" />
      <hg-metric-card label="Active goals" [value]="goals().length.toString()" tone="primary" icon="flag" />
      <hg-metric-card label="Best current streak" [value]="goals().length ? goals()[0].currentStreak + ' days' : '0 days'" tone="accent" icon="local_fire_department" />
      <hg-metric-card label="Rewards earned" [value]="rewards().length.toString()" tone="accent" icon="redeem" />
    </section>
  </section>
</main>
