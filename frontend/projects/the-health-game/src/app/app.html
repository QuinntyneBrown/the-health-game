<div class="app-shell">
  <a class="app-shell__skip-link" href="#main">Skip to main content</a>
  <mat-toolbar class="app-shell__toolbar">
    <hg-app-brand />
  </mat-toolbar>

  <main id="main" class="app-shell__main" tabindex="-1">
    <router-outlet />
  </main>

  <hg-navigation-bar
    class="app-shell__navigation"
    [class.app-shell__navigation--bottom]="viewport() === 'bottom'"
    [class.app-shell__navigation--rail]="viewport() === 'rail'"
    [class.app-shell__navigation--drawer]="viewport() === 'drawer'"
    [variant]="viewport()"
    [items]="navItems"
    [activeItemId]="activeItemId()"
    (itemSelected)="onSelect($event)"
  />
</div>
