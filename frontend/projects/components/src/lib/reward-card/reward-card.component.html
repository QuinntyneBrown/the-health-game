<article class="reward-card">
  <span class="reward-card__mark" aria-hidden="true"></span>
  <h3>{{ name }}</h3>
  <p>{{ earnedDateLabel || statusLabel }}</p>
  <p>{{ description }}</p>
  <div class="progress-row">
    <div class="progress-row__label"><span>Reward progress</span><strong>{{ progressValue }}%</strong></div>
    <span class="progress"><span [attr.style]="progressStyle"></span></span>
  </div>
</article>
