<mat-card class="reward-card" appearance="outlined">
  <mat-icon class="reward-card__mark" aria-hidden="true">{{ rewardIcon }}</mat-icon>
  <mat-card-title>{{ name }}</mat-card-title>
  <mat-card-subtitle>{{ earnedDateLabel || statusLabel }}</mat-card-subtitle>
  <mat-card-content>{{ description }}</mat-card-content>
  <div class="progress-row">
    <div class="progress-row__label"><span>Reward progress</span><strong>{{ progressValue }}%</strong></div>
    <mat-progress-bar mode="determinate" [value]="progressValue" aria-label="Reward progress"></mat-progress-bar>
  </div>
</mat-card>
