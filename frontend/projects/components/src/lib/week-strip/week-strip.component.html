<div class="week-strip" aria-label="Week progress">
  @for (day of days; track day.label) {
    <span class="week-strip__day" [class.week-strip__day--complete]="day.status === 'complete'" [class.week-strip__day--today]="day.status === 'today'">
      <strong>{{ day.label }}</strong>
      <small>{{ day.status === 'complete' ? 'Done' : day.status === 'today' ? 'Today' : 'Next' }}</small>
    </span>
  }
</div>
