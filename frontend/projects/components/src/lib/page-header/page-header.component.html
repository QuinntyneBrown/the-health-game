<div class="page-title">
  @if (eyebrow) { <p class="eyebrow">{{ eyebrow }}</p> }
  <h1 [id]="headingId || null">{{ title }}</h1>
  @if (description) { <p>{{ description }}</p> }
  @if (actionLabel) { <button class="button button--primary" type="button" (click)="actionSelected.emit()">{{ actionLabel }}</button> }
</div>
