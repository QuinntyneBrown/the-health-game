<header class="page-header">
  <div class="page-header__copy">
    @if (eyebrow()) {
      <span class="page-header__eyebrow">{{ eyebrow() }}</span>
    }
    <h1 class="page-header__title" [id]="headingId()">{{ title() }}</h1>
    @if (description()) {
      <p class="page-header__description">{{ description() }}</p>
    }
  </div>

  @if (actionLabel()) {
    <hg-action-button
      class="page-header__action"
      variant="filled"
      [icon]="actionIcon()"
      [label]="actionLabel()"
      (action)="actionSelected.emit()"
    />
  }
</header>
