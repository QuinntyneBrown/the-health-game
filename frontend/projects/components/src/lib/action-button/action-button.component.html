@switch (variant()) {
  @case ('icon') {
    <button
      class="action-button action-button--icon"
      mat-icon-button
      [attr.aria-label]="ariaLabel() ?? label()"
      [attr.type]="type()"
      [disabled]="disabled()"
      (click)="onAction()"
    >
      @if (icon()) {
        <mat-icon class="action-button__icon" fontSet="material-symbols-rounded">{{ icon() }}</mat-icon>
      }
    </button>
  }
  @case ('fab') {
    <button
      class="action-button action-button--fab"
      mat-fab
      [attr.aria-label]="ariaLabel() ?? label()"
      [attr.type]="type()"
      [disabled]="disabled()"
      (click)="onAction()"
    >
      @if (icon()) {
        <mat-icon class="action-button__icon" fontSet="material-symbols-rounded">{{ icon() }}</mat-icon>
      }
    </button>
  }
  @case ('mini-fab') {
    <button
      class="action-button action-button--mini-fab"
      mat-mini-fab
      [attr.aria-label]="ariaLabel() ?? label()"
      [attr.type]="type()"
      [disabled]="disabled()"
      (click)="onAction()"
    >
      @if (icon()) {
        <mat-icon class="action-button__icon" fontSet="material-symbols-rounded">{{ icon() }}</mat-icon>
      }
    </button>
  }
  @case ('extended-fab') {
    <button
      class="action-button action-button--extended-fab"
      mat-fab
      extended
      [attr.aria-label]="ariaLabel() ?? label()"
      [attr.type]="type()"
      [disabled]="disabled()"
      (click)="onAction()"
    >
      @if (icon()) {
        <mat-icon class="action-button__icon" fontSet="material-symbols-rounded">{{ icon() }}</mat-icon>
      }
      <span class="action-button__label">{{ label() }}</span>
    </button>
  }
  @case ('outlined') {
    <button
      class="action-button action-button--outlined"
      mat-stroked-button
      [attr.aria-label]="ariaLabel()"
      [attr.type]="type()"
      [disabled]="disabled()"
      (click)="onAction()"
    >
      @if (icon()) {
        <mat-icon class="action-button__icon" fontSet="material-symbols-rounded">{{ icon() }}</mat-icon>
      }
      <span class="action-button__label">{{ label() }}</span>
    </button>
  }
  @case ('text') {
    <button
      class="action-button action-button--text"
      mat-button
      [attr.aria-label]="ariaLabel()"
      [attr.type]="type()"
      [disabled]="disabled()"
      (click)="onAction()"
    >
      @if (icon()) {
        <mat-icon class="action-button__icon" fontSet="material-symbols-rounded">{{ icon() }}</mat-icon>
      }
      <span class="action-button__label">{{ label() }}</span>
    </button>
  }
  @case ('elevated') {
    <button
      class="action-button action-button--elevated"
      mat-raised-button
      [attr.aria-label]="ariaLabel()"
      [attr.type]="type()"
      [disabled]="disabled()"
      (click)="onAction()"
    >
      @if (icon()) {
        <mat-icon class="action-button__icon" fontSet="material-symbols-rounded">{{ icon() }}</mat-icon>
      }
      <span class="action-button__label">{{ label() }}</span>
    </button>
  }
  @case ('tonal') {
    <button
      class="action-button action-button--tonal"
      mat-flat-button
      [attr.aria-label]="ariaLabel()"
      [attr.type]="type()"
      [disabled]="disabled()"
      (click)="onAction()"
    >
      @if (icon()) {
        <mat-icon class="action-button__icon" fontSet="material-symbols-rounded">{{ icon() }}</mat-icon>
      }
      <span class="action-button__label">{{ label() }}</span>
    </button>
  }
  @default {
    <button
      class="action-button action-button--filled"
      mat-flat-button
      [attr.aria-label]="ariaLabel()"
      [attr.type]="type()"
      [disabled]="disabled()"
      (click)="onAction()"
    >
      @if (icon()) {
        <mat-icon class="action-button__icon" fontSet="material-symbols-rounded">{{ icon() }}</mat-icon>
      }
      <span class="action-button__label">{{ label() }}</span>
    </button>
  }
}
