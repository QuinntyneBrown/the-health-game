<mat-card class="empty-state" appearance="outlined">
  <mat-card-content>
    <mat-icon class="empty-state__mark" aria-hidden="true">{{ icon }}</mat-icon>
    <h2 class="empty-state__title mat-headline-small">{{ title }}</h2>
    <p class="mat-body-medium">{{ description }}</p>
  </mat-card-content>
  @if (actionLabel) {
    <mat-card-actions>
      <button mat-flat-button class="button button--primary" type="button" (click)="actionSelected.emit()">
        @if (actionIcon) { <mat-icon aria-hidden="true">{{ actionIcon }}</mat-icon> }
        <span>{{ actionLabel }}</span>
      </button>
    </mat-card-actions>
  }
</mat-card>
