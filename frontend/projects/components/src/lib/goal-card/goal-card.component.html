<mat-card class="goal-card" appearance="outlined">
  <mat-card-header class="goal-card__top">
    <mat-card-title>{{ title }}</mat-card-title>
    <mat-card-subtitle>{{ description || cadenceLabel }}</mat-card-subtitle>
    <button mat-stroked-button class="button button--ghost" type="button" (click)="actionSelected.emit()">{{ actionLabel }}</button>
  </mat-card-header>
  <div class="progress-row">
    <div class="progress-row__label"><span>{{ progressLabel }}</span><strong>{{ progressValue }}%</strong></div>
    <mat-progress-bar mode="determinate" [value]="progressPercent" [attr.aria-label]="progressLabel"></mat-progress-bar>
  </div>
  <mat-card-content>
    <mat-chip-set class="chips" aria-label="Goal summary">
      <mat-chip>{{ currentStreakLabel }}</mat-chip>
      <mat-chip>{{ longestStreakLabel }}</mat-chip>
      @if (rewardName) { <mat-chip class="chip--accent">{{ rewardName }}</mat-chip> }
    </mat-chip-set>
  </mat-card-content>
</mat-card>
