<article class="goal-card">
  <div class="goal-card__top">
    <div>
      <h3>{{ title }}</h3>
      <p>{{ description || cadenceLabel }}</p>
    </div>
    <button class="button button--ghost" type="button" (click)="actionSelected.emit()">{{ actionLabel }}</button>
  </div>
  <div class="progress-row">
    <div class="progress-row__label"><span>{{ progressLabel }}</span><strong>{{ progressValue }}%</strong></div>
    <span class="progress"><span [attr.style]="progressStyle"></span></span>
  </div>
  <div class="chips">
    <span class="chip">{{ currentStreakLabel }}</span>
    <span class="chip">{{ longestStreakLabel }}</span>
    @if (rewardName) { <span class="chip chip--accent">{{ rewardName }}</span> }
  </div>
</article>
