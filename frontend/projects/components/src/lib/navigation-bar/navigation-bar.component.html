<nav class="app-nav" [class.app-nav--drawer]="variant === 'drawer'" [class.app-nav--rail]="variant === 'rail'" [class.app-nav--bottom]="variant === 'bottom'" aria-label="Primary">
  @for (item of items; track item.id) {
    <button class="app-nav__item" [class.app-nav__item--active]="item.id === activeItemId" type="button" (click)="itemSelected.emit(item.id)">
      <span class="app-nav__mark" aria-hidden="true"></span>
      <span>{{ item.label }}</span>
    </button>
  }
</nav>
