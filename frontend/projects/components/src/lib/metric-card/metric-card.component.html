<article class="metric" [class.metric--primary]="tone === 'primary'" [class.metric--success]="tone === 'success'" [class.metric--accent]="tone === 'accent'" [attr.aria-label]="ariaLabel || null">
  <span class="metric__value">{{ value }}</span>
  <span class="metric__label">{{ label }}</span>
  @if (supportText) { <span class="metric__label">{{ supportText }}</span> }
</article>
