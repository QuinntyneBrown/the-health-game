<mat-button-toggle-group class="segmented" [value]="value" [attr.aria-label]="ariaLabel" (change)="onSelectionChange($event)">
  @for (option of options; track option.value) {
    <mat-button-toggle class="segmented-filter__option" [class.is-active]="option.value === value" [value]="option.value">
      <span class="segmented-filter__label">{{ option.label }}</span>
    </mat-button-toggle>
  }
</mat-button-toggle-group>
