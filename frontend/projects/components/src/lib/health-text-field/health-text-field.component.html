<label class="field">
  <span>{{ label }}</span>
  @if (multiline) {
    <textarea [value]="value" [disabled]="disabled" [readOnly]="isReadonly" (input)="onInput($any($event.target).value)"></textarea>
  } @else {
    <input [type]="type" [value]="value" [disabled]="disabled" [readOnly]="isReadonly" (input)="onInput($any($event.target).value)" />
  }
  @if (helperText && !errorText) { <small>{{ helperText }}</small> }
  @if (errorText) { <small class="inline-error">{{ errorText }}</small> }
</label>
