name: Feature request
description: Propose a scoped improvement or new capability.
title: "Feature: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user problem or project need does this address?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Describe the change you want.
    validations:
      required: true
  - type: textarea
    id: requirements
    attributes:
      label: Related Requirements
      description: Link relevant L1 or L2 requirements if applicable.
      placeholder: "L2-001, L2-008"
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Backend
        - Frontend
        - Documentation
        - Build or tooling
        - Cross-cutting
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Describe any alternatives or tradeoffs.
